{% extends 'reservations/base.html' %}

{% block content %}
<div class="container">
    <div style="max-width: 400px; margin: 0 auto;">
        <h2 style="text-align: center;">Вход в систему</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Логин</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label>Пароль</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%;">Войти</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
